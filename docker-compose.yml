services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway:
    build:
      context: ./packages/gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agent_ops
      - REGISTRY_FILE=/data/agent-registry.json
    volumes:
      - gateway_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:3001
      - GATEWAY_INTERNAL_URL=http://gateway:3001
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER:-LanNguyenSi}
      - GITHUB_REPOS=${GITHUB_REPOS:-agent-preflight,triologue,frost-core,frost-dashboard,agent-planforge,scaffoldkit,memory-weaver,allergen-guard,plagiarism-coach,git-batch-cli}
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-ops.entrypoints=websecure"
      - "traefik.http.routers.agent-ops.rule=Host(`ops.opentriologue.ai`)"
      - "traefik.http.routers.agent-ops.tls=true"
      - "traefik.http.routers.agent-ops.tls.certresolver=letsencrypt"
      - "traefik.http.services.agent-ops.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"

volumes:
  postgres_data:
  gateway_data:

networks:
  default:
  traefik:
    external: true
