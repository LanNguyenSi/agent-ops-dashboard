<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>
  <!-- Radar rings -->
  <circle cx="16" cy="16" r="12" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <circle cx="16" cy="16" r="8" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <circle cx="16" cy="16" r="4" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
  <!-- Crosshairs -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <!-- Radar sweep -->
  <line x1="16" y1="16" x2="28" y2="10" stroke="#22d3ee" stroke-width="1.5" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#22d3ee"/>
  <!-- Agent blips -->
  <circle cx="22" cy="11" r="1.5" fill="#4ade80"/>
  <circle cx="10" cy="20" r="1.5" fill="#4ade80"/>
</svg>
