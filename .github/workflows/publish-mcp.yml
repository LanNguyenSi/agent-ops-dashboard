name: Publish @opentriologue/mcp

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run npm publish --dry-run only (no upload to npm)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=@opentriologue/mcp

      - name: Test
        run: npm test --workspace=@opentriologue/mcp

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        run: npm publish --workspace=@opentriologue/mcp --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace=@opentriologue/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
