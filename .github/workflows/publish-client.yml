name: Publish @opentriologue/client

# Publishes the @opentriologue/client workspace. Trigger either manually
# (workflow_dispatch, with an optional dry-run) or by pushing a tag
# `ops-client-v<version>` that matches packages/client/package.json.
#
# @opentriologue/mcp depends on this package at runtime, so it must be
# published BEFORE the mcp package (publish-mcp.yml preflights for it).
#
# Prerequisite (operator): repo secret NPM_TOKEN with publish rights to the
# @agent-ops npm scope.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run npm publish --dry-run only (no upload to npm)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "ops-client-v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Build, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/ops-client-v')
        run: |
          expected="${GITHUB_REF_NAME#ops-client-v}"
          pkg_version=$(node -p "require('./packages/client/package.json').version")
          if [ "$pkg_version" != "$expected" ]; then
            echo "Tag version ($expected) does not match packages/client/package.json ($pkg_version)" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=@opentriologue/client

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        run: npm publish --workspace=@opentriologue/client --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace=@opentriologue/client --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
