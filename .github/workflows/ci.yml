name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter (dashboard)
        run: npm run lint --workspace=apps/dashboard

      - name: Run linter (gateway)
        run: npm run lint --workspace=packages/gateway

      - name: Type check (dashboard)
        run: npx tsc --noEmit
        working-directory: apps/dashboard

      - name: Type check (gateway)
        run: npm run typecheck --workspace=packages/gateway

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build --workspace=apps/dashboard
        env:
          GITHUB_TOKEN: mock_token_for_build
          GITHUB_REPOS: mock/repo

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present
