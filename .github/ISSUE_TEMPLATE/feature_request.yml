name: Feature request
description: Propose a new capability or widget
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - apps/dashboard
        - packages/client
        - packages/gateway
        - packages/mcp
        - new widget / view
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve? Who feels the pain today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
