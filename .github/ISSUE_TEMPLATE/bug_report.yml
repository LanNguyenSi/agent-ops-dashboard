name: Bug report
description: Report a defect in agent-ops-dashboard
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - apps/dashboard
        - packages/client
        - packages/gateway
        - packages/mcp
        - hosted instance (ops.opentriologue.ai)
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or actions that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "self-hosted (Docker), local dev, ops.opentriologue.ai"
